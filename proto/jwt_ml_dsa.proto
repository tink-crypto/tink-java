syntax = "proto3";

package google.crypto.tink;

option java_package = "com.google.crypto.tink.proto";
option java_multiple_files = true;
option go_package = "github.com/tink-crypto/tink-go/v2/proto/jwt_ml_dsa_go_proto";

// See
// https://www.ietf.org/archive/id/draft-ietf-cose-dilithium-11.html#name-ml-dsa-algorithms
enum JwtMlDsaAlgorithm {
  ML_DSA_UNKNOWN = 0;
  ML_DSA44 = 1;
  ML_DSA65 = 2;
  ML_DSA87 = 3;
}

message JwtMlDsaKeyFormat {
  uint32 version = 1;
  JwtMlDsaAlgorithm algorithm = 2;
}

// key_type: type.googleapis.com/google.crypto.tink.JwtMlDsaPublicKey
message JwtMlDsaPublicKey {
  uint32 version = 1;
  JwtMlDsaAlgorithm algorithm = 2;
  bytes key_value = 3;

  // Optional, custom kid header value to be used with "RAW" keys.
  // "TINK" keys with this value set will be rejected.
  message CustomKid {
    string value = 1;
  }
  CustomKid custom_kid = 4;
}

// key_type: type.googleapis.com/google.crypto.tink.JwtMlDsaPrivateKey
message JwtMlDsaPrivateKey {
  // Required.
  uint32 version = 1;
  // Required. Note that this contains the seed used to generate the private
  // key, not the private key itself.
  bytes key_value = 2;  // Placeholder for debug_redact.
  // The corresponding public key.
  JwtMlDsaPublicKey public_key = 3;
}
